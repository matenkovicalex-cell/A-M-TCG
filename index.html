<body>

<!-- Padajúce pozadia -->
<div class="card-bg" style="background-image:url('images/backround.jpeg');"></div>
<div class="card-bg" style="background-image:url('images/backround1.jpeg');"></div>
<div class="card-bg" style="background-image:url('images/backround2.jpeg');"></div>

<!-- Navigácia -->
<nav>
  <a href="index.html">
    <img src="images/logo.png" alt="A&M TCG Logo" class="logo">
  </a>
  <button class="toggle" onclick="toggleMode()">🌗</button>
</nav>

<!-- Hero sekcia -->
<section class="hero">
  <h1>Some Pokémons from our collection</h1>
  <p>Explore the digital Pokémon Gallery</p>
  <div class="buttons">
    <button onclick="scrollToGallery()">Explore</button>
    <button class="tiktok" onclick="goToTikTok()">Follow us on TikTok</button>
  </div>
</section>

<!-- Vyhľadávanie kariet -->
<section class="search">
  <input type="text" id="searchInput" placeholder="Search Pokémon cards..." />
</section>

<!-- Galéria kariet -->
<section class="grid">
  <div class="card"><img src="images/Mega Charizard x ex.jpeg" alt="Mega Charizard x ex"><p>Mega Charizard x ex 🔥</p></div>
  <div class="card"><img src="images/Crobat.jpeg" alt="Crobat"><p>Crobat 🧠</p></div>
  <div class="card"><img src="images/Mimikyu.jpeg" alt="Mimikyu"><p>Mimikyu 🧠</p></div>
  <div class="card"><img src="images/Mega Venosaur ex.jpeg" alt="Mega Venosaur ex"><p>Mega Venosaur ex 🌱</p></div>
  <div class="card"><img src="images/Tinkaton ex.jpeg" alt="Tinkaton ex"><p>Tinkaton ex 🧠</p></div>
  <div class="card"><img src="images/Tyranitar ex.jpeg" alt="Tyranitar ex"><p>Tyranitar ex 🐉</p></div>
</section>

<!-- Subscribe CTA -->
<section class="cta">
  <h2>Join the collection</h2>
  <form class="subscribe-box" action="mailto:contact.amtcg@gmail.com" method="post" enctype="text/plain">
    <input type="email" name="email" placeholder="Enter your email" required>
    <button class="subscribe-btn" type="submit">Subscribe</button>
  </form>
</section>

<!-- Footer -->
<footer class="footer">
  <hr>
  <p>Contact us: <a href="mailto:contact.amtcg@gmail.com">contact.amtcg@gmail.com</a></p>
</footer>

<script src="script.js"></script>
</body>
